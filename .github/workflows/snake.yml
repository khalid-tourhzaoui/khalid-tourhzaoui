name: 🐍 Generate Snake Animation

on:
  # Se lance automatiquement chaque jour à minuit
  schedule:
    - cron: "0 0 * * *"
  # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:
  # Se lance aussi à chaque push sur main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Génère les SVGs clair et sombre de la snake animation
      - name: 🐍 Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Publie les fichiers SVG sur la branche "output"
      - name: 🚀 Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
